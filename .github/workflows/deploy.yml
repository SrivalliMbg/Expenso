# Deploy to Render on push to main. Uses deploy hook; no image push.
name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import test
        run: python -c "import app; print('app import OK')"

      - name: Build Docker image
        run: docker build -t expenso:build .

      - name: Trigger Render deploy
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set; skipping deploy trigger"
            exit 0
          fi
          curl -f -X POST "$RENDER_DEPLOY_HOOK"
