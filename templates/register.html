<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .phone-row { display: flex; gap: 8px; align-items: stretch; }
        .phone-row .country-code-reg {
            width: 72px; min-width: 72px; padding: 14px 6px; border-radius: 6px; border: 1px solid #bbb;
            background: #fff; font-size: 0.9rem; color: #333;
        }
        .phone-row input { flex: 1; min-width: 0; }
    </style>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <!-- Logo above heading -->
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Expenso Logo" class="logo-img">
        <h1>Register</h1>

        <form id="registerForm">
            <input type="text" id="username" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>

            <div class="password-container">
                <input type="password" id="password" placeholder="Password" required>
                <span class="eye-icon" onclick="togglePassword()">👁️</span>
            </div>

            <select id="status" placeholder="Status (student/professional)" required>
                
                <option value="student">Student</option>
                <option value="professional">Professional</option>
            </select>

            <input type="date" id="dob" placeholder="Date of Birth" required>
            <div class="phone-row">
                <select id="countryCode" class="country-code-reg" aria-label="Country code">
                    <option value="+91">+91</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+61">+61</option>
                    <option value="+81">+81</option>
                    <option value="+86">+86</option>
                    <option value="+49">+49</option>
                    <option value="+33">+33</option>
                    <option value="+971">+971</option>
                    <option value="+65">+65</option>
                    <option value="+82">+82</option>
                    <option value="+55">+55</option>
                    <option value="+52">+52</option>
                    <option value="+27">+27</option>
                    <option value="+234">+234</option>
                    <option value="+20">+20</option>
                    <option value="+90">+90</option>
                    <option value="+31">+31</option>
                    <option value="+39">+39</option>
                    <option value="+34">+34</option>
                    <option value="+7">+7</option>
                    <option value="+92">+92</option>
                    <option value="+88">+88</option>
                    <option value="+94">+94</option>
                    <option value="+64">+64</option>
                </select>
                <input type="tel" id="phone" placeholder="Phone number" required maxlength="15">
            </div>
            <input type="text" id="profession" placeholder="Profession" required>

            <button type="submit">Register</button>
        </form>

        <div class="register-link">
            Already have an account? <a href="/login_page">Login here</a>
        </div>
    </div>
</body>
</html>
